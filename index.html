<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aditya Anand</title>
  <meta
    name="description"
    content="Aditya Anand is a molecular immunologist, cell biologist, and photographer based in San Francisco."
  />
  <style>
    :root {
      --bg: #f4f1ec;
      --text: #1a1a1a;
      --muted: #55514c;
      --accent: #2f3a34;
      --line: #d9d2c8;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(47, 58, 52, 0.45);
      transition: opacity 0.2s ease, border-color 0.2s ease;
    }

    a:hover {
      opacity: 0.7;
      border-color: rgba(47, 58, 52, 0.8);
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 18px;
      font-size: 0.82rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.8rem, 8vw, 4.8rem);
      line-height: 0.95;
      letter-spacing: 0.02em;
      font-weight: 700;
    }

    .subtitle {
      margin: 18px 0 0;
      font-size: 1.4rem;
      line-height: 1.35;
      color: var(--accent);
      font-weight: 500;
    }

    .rule {
      width: 72px;
      height: 1px;
      margin: 30px auto 34px;
      background: var(--line);
    }

    .bio {
      margin: 0 auto;
      max-width: 620px;
      font-size: 1.25rem;
      line-height: 1.75;
      color: var(--muted);
    }

    .links {
      margin-top: 36px;
      display: flex;
      gap: 18px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      font-size: 1rem;
    }

    .dot {
      color: var(--line);
    }

    .footer {
      margin-top: 42px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .page {
        padding: 40px 20px;
      }

      .subtitle {
        font-size: 1.18rem;
      }

      .bio {
        font-size: 1.08rem;
        line-height: 1.7;
      }

      .links {
        gap: 12px;
      }

      .dot {
        display: none;
      }

      .links a {
        width: 100%;
        border-bottom: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <p class="eyebrow">San Francisco</p>

      <h1>Aditya Anand</h1>

      <p class="subtitle">Scientist and photographer.</p>

      <div class="rule"></div>

      <p class="bio">
        I’m a molecular immunologist and cell biologist based in San Francisco,
        interested in using AI for mechanistic biology and building tools that
        make scientific learning more accessible.
      </p>

      <nav class="links" aria-label="Contact links">
        <a href="mailto:adityaanand131@gmail.com">Email</a>
        <span class="dot">·</span>
        <a href="https://instagram.com/miradores" target="_blank" rel="noopener noreferrer">Instagram</a>
      </nav>

      <p class="footer">
        adityaanand.org
      </p>
    </section>
  </main>
</body>
</html>
